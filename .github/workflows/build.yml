name: Build TheRock

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub-hosted runner hard cap is 6h; TheRock's own estimate is
    # "2-4h on 16 cores" and this runner has far fewer cores. actions/cache
    # on the build tree lets a re-triggered run resume ninja's progress
    # instead of restarting cold if this timeout is hit.
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v4

    - name: Free up runner disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: false

    - name: Get version
      id: version
      run: echo "tag=$(cat .tags)" >> $GITHUB_OUTPUT

    - name: Install build prerequisites
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          ca-certificates curl git gnupg software-properties-common \
          clang lld cmake ninja-build gfortran patchelf automake libtool libtool-bin \
          bison flex xxd scons meson \
          libvulkan-dev mesa-vulkan-drivers python3-dev python3-pip python3-venv \
          build-essential lsb-release procps \
          libgl1-mesa-dev libglx-dev libopengl-dev libsqlite3-dev

    - name: Install Clang 21 (TheRock requires >= 21)
      run: |
        curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
        sudo bash /tmp/llvm.sh 21
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 210
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 210
        sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-21 210
        sudo update-alternatives --set clang /usr/bin/clang-21
        sudo update-alternatives --set clang++ /usr/bin/clang++-21
        sudo update-alternatives --set lld /usr/bin/lld-21

    - name: Install lit (LLVM Integrated Tester)
      run: pip3 install --break-system-packages --no-cache-dir lit

    - name: Prepare VLLM_DIR
      run: |
        sudo mkdir -p /opt/src/vllm
        sudo chown "$(id -u):$(id -g)" /opt/src/vllm

    # Unique key per run so the cache save always happens (actions/cache
    # refuses to overwrite an existing key); restore-keys picks up the
    # most recent previous run's progress by prefix. Ninja's own state
    # (.ninja_log, build.ninja, stamps) then makes the resumed run skip
    # everything already completed instead of restarting cold.
    - name: Cache build tree
      uses: actions/cache@v4
      with:
        path: /opt/src/vllm
        key: therock-build-${{ hashFiles('vllm-packages.yaml', 'patches/*.patch') }}-${{ github.run_id }}
        restore-keys: |
          therock-build-${{ hashFiles('vllm-packages.yaml', 'patches/*.patch') }}-

    # Leaves ~15min margin under the 6h job cap for the cache-save
    # post-step to run. `|| true` means a timeout doesn't fail the step -
    # completion is checked explicitly below via the therock-built marker,
    # so a partial run still saves its cache and exits the job cleanly
    # instead of getting killed and skipping the cache-save post-step
    # (which is what happened when this ran with no timeout wrapper: the
    # job hit an external shutdown signal and cache save was skipped
    # entirely, losing 1h30 of progress).
    - name: Build TheRock
      run: timeout 5h45m ./build-vllm.sh || true

    - name: Check build completed
      id: check
      run: |
        if [ -x /opt/src/vllm/local/bin/hipcc ]; then
          echo "done=true" >> $GITHUB_OUTPUT
        else
          echo "done=false" >> $GITHUB_OUTPUT
          echo "::warning::TheRock build did not finish in this run; re-run the workflow to resume from cache."
        fi

    - name: Package
      if: steps.check.outputs.done == 'true'
      run: |
        tar czf therock-gfx1151-${{ steps.version.outputs.tag }}.tar.gz -C /opt/src/vllm/local .

    - name: Publish release
      if: steps.check.outputs.done == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        files: therock-gfx1151-${{ steps.version.outputs.tag }}.tar.gz
