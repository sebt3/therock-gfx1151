name: Docker Image CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub-hosted runner hard cap is 6h; TheRock's own estimate is
    # "2-4h on 16 cores" and this runner has far fewer cores. The BuildKit
    # cache mount in the Dockerfile lets a re-triggered run resume instead
    # of restarting cold if this timeout is hit.
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v4

    - name: Free up runner disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: false

    - name: Get version
      id: version
      run: echo "tag=$(cat .tags)" >> $GITHUB_OUTPUT

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Github Login
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
